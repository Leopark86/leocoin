name: 난지캠핑장 잔여 알리미

on:
  schedule:
    # 매시간 정각 실행 (UTC 기준 → KST = UTC+9)
    - cron: "0 * * * *"
  workflow_dispatch:
    # 수동 실행 버튼 (테스트용)

jobs:
  check-availability:
    name: 잔여 확인 및 텔레그램 알림
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      - name: 잔여 확인 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RSV_SVC_ID: ${{ vars.RSV_SVC_ID || 'S260303100832611273' }}
          MODE: once
          LOOK_AHEAD_WEEKS: "8"
          LOG_LEVEL: INFO
        run: python main.py
