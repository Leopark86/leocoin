name: 시장 데이터 알림

on:
  schedule:
    # 매시 5분 실행 (UTC 기준 — KST = UTC+9, 즉 KST 매시 14분)
    # 정각(0분)은 GitHub Actions 전 세계 혼잡 시간대라 드랍되는 경우가 많음
    - cron: "5 * * * *"
  workflow_dispatch:
    # 수동 실행 (테스트용)

jobs:
  send-market-update:
    name: 시세 수집 및 텔레그램 전송
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-market.txt

      - name: 의존성 설치
        run: pip install -r requirements-market.txt

      - name: 시장 데이터 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: once
          LOG_LEVEL: INFO
          TZ: Asia/Seoul
        run: python market_main.py
