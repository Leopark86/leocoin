name: 시장 데이터 알림

on:
  workflow_dispatch:
    # cron-job.org 에서 매시 호출 (또는 수동 테스트용)

jobs:
  send-market-update:
    name: 시세 수집 및 텔레그램 전송
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-market.txt

      - name: 의존성 설치
        run: pip install -r requirements-market.txt

      - name: 시장 데이터 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: once
          LOG_LEVEL: INFO
          TZ: Asia/Seoul
        run: python market_main.py
